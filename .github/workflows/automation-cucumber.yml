name: QA CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_mobile:
        description: 'Run Android mobile smoke tests'
        required: false
        default: false
        type: boolean

jobs:
  qa-gate:
    name: Lint + API + Web + Cucumber
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start backend and frontend
        run: |
          nohup npm run dev:backend > backend.log 2>&1 &
          nohup npm run dev:frontend > frontend.log 2>&1 &

      - name: Wait for services
        run: npx wait-on http://localhost:5173 http://localhost:4000/api/health

      - name: Lint
        run: npm run lint

      - name: Run API automation tests
        run: npm run test:api

      - name: Run web automation tests
        run: npm run test:web

      - name: Run Cucumber web tests
        run: npm run test:cucumber:web

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            backend.log
            frontend.log
          if-no-files-found: warn

  build-artifact:
    name: Build production artifact
    runs-on: ubuntu-latest
    needs: qa-gate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist
          if-no-files-found: error

  release-bundle:
    name: Release bundle (main/master)
    runs-on: ubuntu-latest
    needs: build-artifact
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create release archive
        run: |
          tar -czf sourdough-bakery-build.tar.gz dist

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: sourdough-bakery-build.tar.gz
          if-no-files-found: error

  mobile-smoke:
    name: Mobile smoke (manual)
    runs-on: ubuntu-latest
    needs: qa-gate
    if: github.event_name == 'workflow_dispatch' && inputs.run_mobile == true
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Appium Android driver
        run: npx appium driver install uiautomator2

      - name: Start backend and frontend
        run: |
          nohup npm run dev:backend > backend.log 2>&1 &
          nohup npm run dev:frontend > frontend.log 2>&1 &

      - name: Wait for services
        run: npx wait-on http://localhost:5173 http://localhost:4000/api/health

      - name: Run Android emulator and mobile tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: npm run test:mobile

      - name: Upload mobile service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-service-logs
          path: |
            backend.log
            frontend.log
          if-no-files-found: warn
